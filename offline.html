<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6b00" />
    <title>SpelTeller offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #fef6d8;
        --bg-2: #ffe6ce;
        --ink: #1e1d24;
        --card: rgba(255, 255, 255, 0.88);
        --primary: #ff6b00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "Nunito", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 20%, #fff3af 0%, transparent 40%),
          radial-gradient(circle at 95% 10%, #ffd5b4 0%, transparent 33%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
      }

      main {
        width: min(100%, 30rem);
        padding: 1.5rem;
        border-radius: 1.25rem;
        background: var(--card);
        box-shadow: 0 18px 40px rgba(44, 31, 15, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.7rem, 5vw, 2.5rem);
      }

      p {
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.7rem 1rem;
        border-radius: 999px;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Je bent offline</h1>
      <p>
        SpelTeller blijft lokaal werken voor eerder geladen onderdelen. Zodra je weer verbinding hebt,
        kun je opnieuw synchroniseren of verder browsen.
      </p>
      <a href="./">Terug naar de app</a>
    </main>
  </body>
</html>
